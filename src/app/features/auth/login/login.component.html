<div class="login-page">
  <div class="login-card">
    <!-- Brand -->
    <div class="login-card__brand">
      <div class="login-card__icon">&#9762;</div>
      <h1 class="login-card__title">Z-SAFE</h1>
      <p class="login-card__subtitle">Sistema de Defensa contra Hordas</p>
    </div>

    <!-- Error alert -->
    @if (error()) {
      <div class="login-card__alert">
        &#9888; {{ error() }}
      </div>
    }

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="admin / defensor"
          autocomplete="username" />
        @if (fieldError('username')) {
          <span class="field-error">{{ fieldError('username') }}</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password" />
        @if (fieldError('password')) {
          <span class="field-error">{{ fieldError('password') }}</span>
        }
      </div>

      <app-ui-button
        type="submit"
        variant="primary"
        size="lg"
        [loading]="loading()"
        [fullWidth]="true">
        Iniciar Sesión
      </app-ui-button>
    </form>

    <p class="login-card__hint">admin / Admin123! &nbsp;·&nbsp; defensor / Def123!</p>
  </div>
</div>
